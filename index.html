<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maridadi Cars</title>

<style>
body {
  margin: 0;
  font-family: 'Arial', serif;
}

/* HERO SECTION */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  background: url('clouds.jpg') no-repeat center center;
  background-size: cover;
  flex-direction: column;
}

/* LOGO */
.logo {
  width: 360px;
  height: auto;
  margin-bottom: 30px;
}

/* TITLE */
.title {
  font-size: 56px;
  color: #b8963c;
  letter-spacing: 2px;
  margin-bottom: 20px;
}

/* GOLD LINE */
.line {
  width: 80%;
  height: 1px;
  background: #d4af37;
  margin: 20px auto;
}

/* TEXT */
.text {
  font-size: 22px;
  color: #b8963c;
  margin: 10px 0;
  letter-spacing: 1px;
}

.sub {
  font-size: 20px;
  color: #b8963c;
  margin: 15px 0;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 30px;
  padding: 16px 36px;
  background: #0b0b2d;
  color: #d4af37;
  text-decoration: none;
  font-size: 18px;
  border: 2px solid #d4af37;
  letter-spacing: 1px;
  cursor: pointer;
}

/* RESPONSIVE */
@media(max-width:600px){

  .title {
    font-size: 38px;
  }

  .text {
    font-size: 18px;
  }

  .sub {
    font-size: 16px;
  }

  .logo {
    width: 240px;
    margin-bottom: 20px;
  }

}
</style>
</head>

<body>

<div class="hero">

  <!-- Logo -->
  <img src="logo.png" alt="Maridadi Cars Logo" class="logo">

  <!-- Title -->
  <div class="title">
    MARIDADI<br>CARS
  </div>

  <div class="line"></div>

  <!-- TEXT -->
  <div class="text">
    SUVS • SEDANS • LUXURY • PERFORMANCE
  </div>

  <div class="sub">
    PREMIUM IMPORTS
  </div>

  <div class="line"></div>

  <div class="sub">
    DRIVE STATUS • DRIVE COMFORT
  </div>

  <!-- BUTTON -->
  <a href="products.html" class="btn">
    VIEW COLLECTION
  </a>

</div>

</body>
</html>
