<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maridadi Cars Intro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:black;
font-family:Arial,sans-serif;
}

/* FULLSCREEN GIF/VIDEO */
.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:1;
}

/* DARK OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
z-index:2;
}

/* TEXT */
.text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:3;
text-align:center;
opacity:0;
animation:fadeText 3s ease forwards;
animation-delay:1s;
}

.text h1{
color:white;
font-size:38px;
letter-spacing:5px;
font-weight:300;
}

.text p{
color:#d4af37;
margin-top:12px;
font-size:14px;
letter-spacing:3px;
}

/* FADE ANIMATION */
@keyframes fadeText{

0%{
opacity:0;
transform:translate(-50%,-40%);
}

100%{
opacity:1;
transform:translate(-50%,-50%);
}

}

/* CINEMATIC FADE OUT */
.fadeout{
animation:fadeOut 1s ease forwards;
}

@keyframes fadeOut{

0%{
opacity:1;
}

100%{
opacity:0;
}

}

</style>
</head>

<body>

<!-- GIF OR VIDEO -->
<img src="burnout.gif" class="bg">

<!-- OVERLAY -->
<div class="overlay"></div>

<!-- TEXT -->
<div class="text" id="introText">

<h1>WELCOME TO MARIDADI CARS</h1>

<p>LUXURY • PERFORMANCE • PRESTIGE</p>

</div>

<!-- SOUND -->
<audio id="introAudio" autoplay>

<source src="burnout.mp3" type="audio/mpeg">

</audio>

<script>

/* FORCE SOUND PLAY */
window.onload = function(){

const audio = document.getElementById("introAudio");

audio.volume = 1;

audio.play().catch(()=>{});

}

/* FADE EVERYTHING OUT BEFORE REDIRECT */
setTimeout(()=>{

document.body.classList.add("fadeout");

},4000);

/* REDIRECT AFTER 5 SECONDS */
setTimeout(()=>{

window.location.href="products.html";

},5000);

</script>

</body>
</html>
