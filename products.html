<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maridadi Cars</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:url('Background.PNG') no-repeat center top fixed;
  background-size:100% auto;
  background-color:#f5f2eb;
  text-align:center;
}

/* LOGO */
.logo-container{
  display:inline-block;
  background-color:#f5f2eb;
  border-radius:10px;
  padding:5px;
  margin-top:20px;
  box-shadow:0 4px 20px rgba(0,0,0,0.15);
}

.logo{
  width:180px;
  display:block;
}

/* TITLES */
h1{
  color:#b8963c;
  letter-spacing:3px;
  margin-bottom:5px;
}

.sub{
  color:#b8963c;
  font-size:12px;
  letter-spacing:2px;
}

/* DIVIDER */
.divider{
  width:120px;
  height:2px;
  background:#b8963c;
  margin:10px auto 20px;
  position:relative;
}

.divider::after{
  content:"◆";
  position:absolute;
  top:-9px;
  left:50%;
  transform:translateX(-50%);
  color:#b8963c;
  font-size:12px;
}

/* CATEGORY BAR */
.bar{
  display:flex;
  justify-content:center;
  gap:10px;
  background:rgba(255,255,255,0.8);
  padding:10px;
  border-radius:30px;
  max-width:700px;
  margin:20px auto;
  flex-wrap:wrap;
}

.bar button{
  border:none;
  background:none;
  color:#b8963c;
  cursor:pointer;
  font-weight:bold;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  max-width:1000px;
  margin:20px auto;
  padding:0 10px;
}

.item{
  aspect-ratio:1/1;
  overflow:hidden;
  border-radius:6px;
  box-shadow:0 5px 20px rgba(184,150,60,0.15);
  transition:0.3s;
}

.item:hover{
  transform:scale(1.05);
}

.item img{
  width:100%;
  height:100%;
  object-fit:cover;
  cursor:pointer;
}

.desc{
  font-size:12px;
  color:#b8963c;
  margin-top:5px;
}

/* EXPAND */
.expand{
  display:none;
  margin:30px auto;
}

.expand img{
  width:90%;
  max-width:700px;
  border-radius:10px;
}

.expand p{
  color:#b8963c;
  margin-top:10px;
  font-size:18px;
}

/* CATEGORY */
.category{
  display:none;
}

.active{
  display:block;
}

/* WHATSAPP */
.whatsapp-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:12px 18px;
  border-radius:50px;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

</style>
</head>

<body>

<div class="logo-container">
  <img src="Logo.PNG" class="logo">
</div>

<h1>MARIDADI CARS</h1>
<p class="sub">PREMIUM IMPORTED VEHICLES</p>

<div class="divider"></div>

<!-- CATEGORY BAR -->
<div class="bar">

<button onclick="show('luxury')">LUXURY</button>
<button onclick="show('suvs')">SUVS</button>
<button onclick="show('pickups')">PICKUPS</button>
<button onclick="show('sedans')">SEDANS</button>
<button onclick="show('vans')">FAMILY VANS</button>

</div>

<!-- EXPAND -->
<div id="expand" class="expand">
  <img id="expandImg">
  <p id="expandText"></p>
</div>

<!-- LUXURY -->
<div id="luxury" class="category active">

<div class="grid">

<div onclick="expand('atenza.JPG','Mazda Atenza')"><div class="item"><img src="atenza.JPG"></div><div class="desc">Mazda Atenza</div></div>

<div onclick="expand('lexus.JPG','Lexus')"><div class="item"><img src="lexus.JPG"></div><div class="desc">Lexus</div></div>

<div onclick="expand('porsche.JPG','Porsche')"><div class="item"><img src="porsche.JPG"></div><div class="desc">Porsche</div></div>

<div onclick="expand('prado.JPG','Toyota Prado')"><div class="item"><img src="prado.JPG"></div><div class="desc">Toyota Prado</div></div>

<div onclick="expand('premio.JPG','Toyota Premio')"><div class="item"><img src="premio.JPG"></div><div class="desc">Toyota Premio</div></div>

<div onclick="expand('serena.JPG','Nissan Serena')"><div class="item"><img src="serena.JPG"></div><div class="desc">Nissan Serena</div></div>

<div onclick="expand('V8.JPG','V8')"><div class="item"><img src="V8.JPG"></div><div class="desc">V8</div></div>

</div>
</div>

<!-- SUVS -->
<div id="suvs" class="category">
<div class="grid">

<div onclick="expand('x_trail.JPG','Nissan X Trail')"><div class="item"><img src="x_trail.JPG"></div><div class="desc">Nissan X Trail</div></div>

<div onclick="expand('forester.JPG','Subaru Forester')"><div class="item"><img src="forester.JPG"></div><div class="desc">Subaru Forester</div></div>

<div onclick="expand('subaru.JPG','Subaru')"><div class="item"><img src="subaru.JPG"></div><div class="desc">Subaru</div></div>

<div onclick="expand('mazdacs5.JPG','Mazda CX5')"><div class="item"><img src="mazdacs5.JPG"></div><div class="desc">Mazda CX5</div></div>

</div>
</div>

<!-- PICKUPS -->
<div id="pickups" class="category">
<div class="grid">

<div onclick="expand('hilux.JPG','Toyota Hilux')"><div class="item"><img src="hilux.JPG"></div><div class="desc">Toyota Hilux</div></div>

<div onclick="expand('ford_ranger.JPG','Ford Ranger')"><div class="item"><img src="ford_ranger.JPG"></div><div class="desc">Ford Ranger</div></div>

<div onclick="expand('d_max.JPG','Isuzu D Max')"><div class="item"><img src="d_max.JPG"></div><div class="desc">Isuzu D Max</div></div>

</div>
</div>

<!-- SEDANS -->
<div id="sedans" class="category">
<div class="grid">

<div onclick="expand('axio.JPG','Toyota Axio')"><div class="item"><img src="axio.JPG"></div><div class="desc">Toyota Axio</div></div>

<div onclick="expand('bluebird.JPG','Nissan Bluebird')"><div class="item"><img src="bluebird.JPG"></div><div class="desc">Nissan Bluebird</div></div>

<div onclick="expand('hyundai.JPG','Hyundai')"><div class="item"><img src="hyundai.JPG"></div><div class="desc">Hyundai</div></div>

</div>
</div>

<!-- VANS -->
<div id="vans" class="category">
<div class="grid">

<div onclick="expand('noah.JPG','Toyota Noah')"><div class="item"><img src="noah.JPG"></div><div class="desc">Toyota Noah</div></div>

<div onclick="expand('voxy.JPG','Toyota Voxy')"><div class="item"><img src="voxy.JPG"></div><div class="desc">Toyota Voxy</div></div>

</div>
</div>

<!-- WHATSAPP -->
<a class="whatsapp-btn" href="https://wa.me/254700000000" target="_blank">
Chat on WhatsApp
</a>

<script>

/* FIXED EXPAND SYSTEM */
function show(id){

document.querySelectorAll('.category').forEach(el=>{
el.style.display='none';
});

document.getElementById(id).style.display='block';

/* 🔥 FIX: close expanded image when switching categories */
document.getElementById("expand").style.display="none";

}

function expand(img,text){

let box=document.getElementById("expand");

document.getElementById("expandImg").src=img;
document.getElementById("expandText").innerText=text;

box.style.display="block";

box.scrollIntoView({behavior:'smooth'});

}

</script>

</body>
</html>
