<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maridadi Cars</title>

<style>

body {
  margin: 0;
  font-family: 'Arial', serif;

  /* SOUTH FLORIDA GOLD LUXURY TONE */
  background-color: #f5f2eb;
}

/* HERO SECTION */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;

  /* YOUR BACKGROUND IMAGE */
  background: url('Background.PNG') no-repeat center center;
  background-size: cover;

  flex-direction: column;
  position: relative;
}

/* DARK OVERLAY */
.hero::before {
  content: "";
  position: absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.55);
}

/* CONTENT ABOVE OVERLAY */
.hero-content {
  position: relative;
  z-index: 2;
}

/* LOGO */
.logo {
  width: 360px;
  height: auto;
  margin-bottom: 30px;
}

/* GOLD LINE */
.line {
  width: 80%;
  height: 1px;
  background: #d4af37;
  margin: 20px auto;
}

/* TEXT */
.text {
  font-size: 22px;
  color: #b8963c;
  margin: 10px 0;
  letter-spacing: 1px;
}

.sub {
  font-size: 20px;
  color: #b8963c;
  margin: 15px 0;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 30px;
  padding: 16px 36px;
  background: #0b0b2d;
  color: #d4af37;
  text-decoration: none;
  font-size: 18px;
  border: 2px solid #d4af37;
  letter-spacing: 1px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: #d4af37;
  color: black;
}

/* RESPONSIVE */
@media(max-width:600px){

  .logo {
    width: 240px;
    margin-bottom: 20px;
  }

  .text {
    font-size: 18px;
  }

  .sub {
    font-size: 16px;
  }

}

</style>
</head>

<body>

<div class="hero">

  <div class="hero-content">

    <!-- UPDATED LOGO -->
    <img src="Logo.PNG" alt="Maridadi Cars Logo" class="logo">

    <div class="line"></div>

    <!-- CAR CATEGORIES -->
    <div class="text">
      SUVS • SEDANS • LUXURY • PICKUPS
    </div>

    <div class="sub">
      PREMIUM CAR DEALERSHIP
    </div>

    <div class="line"></div>

    <div class="sub">
      DRIVE STATUS • DRIVE POWER • DRIVE LUXURY
    </div>

    <!-- CTA -->
    <a href="products.html" class="btn">
      CHECK OUT YOUR DREAM CAR
    </a>

  </div>

</div>

</body>
</html>
