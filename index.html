<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maridadi Cars</title>

<style>

body {

  margin: 0;

  font-family: 'Arial', serif;

  /* LUXURY CHAMPAGNE BACKGROUND */

  background-color: #f8f4ef;

}

/* HERO SECTION */

.hero {

  height: 100vh;

  display: flex;

  justify-content: center;

  align-items: center;

  text-align: center;

  /* SOFT LUXURY OVERLAY + BACKGROUND */

  background:

  linear-gradient(

    rgba(255,248,242,0.30),

    rgba(255,244,236,0.30)

  ),

  url('Background.PNG') no-repeat center center;

  background-size: cover;

  flex-direction: column;

  position: relative;

}

/* DARK OVERLAY */

.hero::before {

  content: "";

  position: absolute;

  top:0;

  left:0;

  width:100%;

  height:100%;

  background: rgba(0,0,0,0.45);

}

/* CONTENT ABOVE OVERLAY */

.hero-content {

  position: relative;

  z-index: 2;

}

/* LOGO */

.logo {

  width: 360px;

  height: auto;

  margin-bottom: 30px;

}

/* LUXURY LINE */

.line {

  width: 80%;

  height: 1px;

  background: #e3c3a1;

  margin: 20px auto;

}

/* TEXT */

.text {

  font-size: 22px;

  color: #c7a27c;

  margin: 10px 0;

  letter-spacing: 1px;

}

.sub {

  font-size: 20px;

  color: #c7a27c;

  margin: 15px 0;

}

/* BUTTON */

.btn {

  display: inline-block;

  margin-top: 30px;

  padding: 16px 36px;

  /* SOFT GLASS BUTTON */

  background: rgba(255,255,255,0.08);

  color: #e3c3a1;

  text-decoration: none;

  font-size: 18px;

  border: 2px solid #e3c3a1;

  letter-spacing: 1px;

  cursor: pointer;

  transition: 0.3s;

  backdrop-filter: blur(4px);

}

.btn:hover {

  background: #e3c3a1;

  color: black;

}

/* RESPONSIVE */

@media(max-width:600px){

  .logo {

    width: 240px;

    margin-bottom: 20px;

  }

  .text {

    font-size: 18px;

  }

  .sub {

    font-size: 16px;

  }

}

</style>

</head>

<body>

<div class="hero">

  <div class="hero-content">

    <!-- UPDATED LOGO -->

    <img src="Logo.PNG" alt="Maridadi Cars Logo" class="logo">

    <div class="line"></div>

    <!-- CAR CATEGORIES -->

    <div class="text">

      SUVS • SEDANS • LUXURY • PICKUPS

    </div>

    <div class="sub">

      PREMIUM CAR DEALERSHIP

    </div>

    <div class="line"></div>

    <div class="sub">

      DRIVE STATUS • DRIVE POWER • DRIVE LUXURY

    </div>

    <!-- CTA -->

    <a href="products.html" class="btn">

      CHECK OUT YOUR DREAM CAR

    </a>

  </div>

</div>

</body>

</html>
