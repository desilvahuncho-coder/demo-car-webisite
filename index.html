<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maridadi Cars</title>

<style>

body{

  margin:0;

  font-family:'Arial', serif;

  overflow-x:hidden;

}

/* HERO SECTION */

.hero{

  min-height:100vh;

  display:flex;

  justify-content:center;

  align-items:center;

  text-align:center;

  /* SOFT LUXURY BACKGROUND */

  background:

  linear-gradient(

    rgba(255,248,242,0.18),

    rgba(255,244,236,0.18)

  ),

  url('Background.PNG') no-repeat center center;

  background-size:cover;

  background-position:center;

  flex-direction:column;

  padding:40px 20px;

  box-sizing:border-box;

}

/* HERO IMAGE REPLACING LOGO */

.logo{

  width:100%;

  max-width:1100px;

  height:auto;

  object-fit:cover;

  margin-bottom:35px;

  display:block;

  border-radius:18px;

  box-shadow:

  0 10px 40px rgba(0,0,0,0.35);

}

/* TITLE */

.title{

  font-size:56px;

  color:#c7a27c;

  letter-spacing:2px;

  margin-bottom:20px;

  text-shadow:

  0 2px 10px rgba(0,0,0,0.45);

}

/* LUXURY LINE */

.line{

  width:80%;

  max-width:700px;

  height:1px;

  background:#e3c3a1;

  margin:20px auto;

}

/* TEXT INFO */

.text{

  font-size:22px;

  color:#c7a27c;

  margin:10px 0;

  letter-spacing:1px;

  text-shadow:

  0 2px 10px rgba(0,0,0,0.45);

}

.sub{

  font-size:20px;

  color:#c7a27c;

  margin:15px 0;

  text-shadow:

  0 2px 10px rgba(0,0,0,0.45);

}

/* BUTTON */

.btn{

  display:inline-block;

  margin-top:30px;

  padding:16px 36px;

  background:rgba(11,11,45,0.88);

  color:#e3c3a1;

  text-decoration:none;

  font-size:18px;

  border:2px solid #e3c3a1;

  letter-spacing:1px;

  cursor:pointer;

  transition:0.3s;

  border-radius:10px;

  backdrop-filter:blur(4px);

}

.btn:hover{

  background:#e3c3a1;

  color:black;

}

/* RESPONSIVE */

@media(max-width:600px){

  .title{

    font-size:38px;

  }

  .text{

    font-size:18px;

  }

  .sub{

    font-size:16px;

  }

  .logo{

    max-width:100%;

    border-radius:14px;

    margin-bottom:25px;

  }

}

</style>

</head>

<body>

<div class="hero">

  <!-- HERO IMAGE -->

  <img src="Hero.PNG.GIf" alt="Maridadi Cars Hero" class="logo">

  <!-- TITLE -->

  <div class="title">

    MARIDADI<br>CARS

  </div>

  <div class="line"></div>

  <!-- CAR INFO -->

  <div class="text">

    SUVS • SEDANS • LUXURY • PICKUPS

  </div>

  <div class="sub">

    PREMIUM CAR DEALERSHIP

  </div>

  <div class="line"></div>

  <div class="sub">

    DRIVE STATUS • DRIVE POWER • DRIVE LUXURY

  </div>

  <!-- CTA -->

  <a href="products.html" class="btn">

    VIEW CARS

  </a>

</div>

</body>

</html>
